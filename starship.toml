"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# A minimal left prompt
format = """
$directory\
$cmd_duration\
${custom.jujutsu}\
$line_break\
$character"""

[fill]
symbol = ""

[directory]
truncate_to_repo = false
style = "bright-yellow"
truncation_length = 8

[custom.jujutsu]
when = true
shell = ["sh"]
command = "~/.config/starship/jujutsu.sh"
