# General

bind = SUPER SHIFT, P, exec, 1password --quick-access

windowrulev2 = float, class:^(.*1password.*)$,initialTitle:1Password
windowrulev2 = center, class:^(.*1password.*)$,initialTitle:1Password
windowrulev2 = size 40% 40%, class:^(.*1password.*)$,initialTitle:1Password
windowrulev2 = stayfocused, class:^(.*1password.*)$,initialTitle:1Password

# === TUIs

# Numr Override
windowrulev2 = size 30% 40%, class:^(local\.tui\.numr).*$

bind = SUPER SHIFT, C, exec, focus-tui numr

# Standard

windowrulev2 = float, class:^(local\.tui).*$
windowrulev2 = center, class:^(local\.tui).*$
windowrulev2 = size 70% 75%, class:^(local\.tui).*$
windowrulev2 = stayfocused, class:^(local\.tui).*$

bind = SUPER SHIFT, K, exec, focus-tui btm
bind = SUPER SHIFT, B, exec, focus-tui bluetui
bind = SUPER SHIFT, A, exec, focus-tui wiremix
bind = SUPER SHIFT, L, exec, focus-tui yazi

# ===

windowrulev2 = size 1000 700,floating:1,initialClass:zen

windowrulev2 = float,class:org.freedesktop.impl.portal.desktop.kde
windowrulev2 = size 1200 900,class:org.freedesktop.impl.portal.desktop.kde
