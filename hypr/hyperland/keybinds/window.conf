# Resize window columns
bind = SUPER ALT, equal, layoutmsg, colresize +.2
bind = SUPER ALT, minus, layoutmsg, colresize -.2

bind = CTRL ALT SUPER, return, layoutmsg, colresize 1

bind = SUPER ALT, return, layoutmsg, fit visible

# Swap column with left/right
bind = SUPER ALT, bracketleft, layoutmsg, swapcol l
bind = SUPER ALT, bracketright, layoutmsg, swapcol r

# Move window between monitors [left/right]
bind = CTRL ALT SUPER , left, movewindow, mon:+1
bind = CTRL ALT SUPER , right, movewindow, mon:-1

bind = SUPER ALT CTRL, P, layoutmsg, promote

# Move window focus
bind = SUPER, left, layoutmsg, move -col
bind = SUPER, right, layoutmsg, move +col
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Drag and Resize Windows
bindm = SUPER SHIFT, mouse:272, movewindow
bindm = SUPER SHIFT, mouse:273, resizewindow
